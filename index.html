<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>鹿田弓道部 新歓予約</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;800;900&display=swap');
    
    :root { --main-green: #568670; --accent-pink: #FF87B2; --paper: #fdf6e3; --ink: #333; }
    
    body { background-color: var(--main-green); font-family: 'M PLUS Rounded 1c', sans-serif; color: var(--ink); margin: 0; padding-bottom: 50px; }
    
    /* 掲示板のようなメモ用紙のデザイン */
    .container { max-width: 480px; margin: 20px auto; padding: 0 15px; }
    .paper-sheet { background: var(--paper); border-radius: 4px; padding: 25px; box-shadow: 8px 8px 0px rgba(0,0,0,0.2); position: relative; border: 1px solid #ddd; }
    
    /* 見出し：画像のようなピンク背景 */
    .header-tape { background: var(--accent-pink); color: white; padding: 12px; text-align: center; border-radius: 4px; margin: -10px -10px 25px -10px; border: 2px solid var(--ink); box-shadow: 4px 4px 0px var(--ink); }
    .header-tape h1 { font-size: 1.1rem; font-weight: 900; letter-spacing: 0.05em; -webkit-text-stroke: 0.5px var(--ink); }

    /* お知らせ：画像の説明ボックス風 */
    .notice-box { background: rgba(86, 134, 112, 0.1); border: 2px solid var(--main-green); border-radius: 8px; padding: 12px; margin-bottom: 25px; font-size: 11px; font-weight: 800; color: var(--main-green); }

    /* カレンダー：的（マト）を主役 */
    #calendar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    .day-item { position: relative; display: flex; flex-direction: column; align-items: center; padding-bottom: 10px; }
    
    .mato { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--ink); background: white; cursor: pointer; transition: 0.2s; position: relative; z-index: 2; box-shadow: 3px 3px 0px rgba(0,0,0,0.1); }
    .mato.kasumimato { background: radial-gradient(circle, #fff 8%, #333 9% 23%, #fff 24% 39%, #333 40% 55%, #fff 56% 71%, #333 72% 87%, #fff 88%); }
    .mato.hoshimato { background: radial-gradient(circle, #333 18%, #fff 19%); }
    
    /* 刺さっている矢の表現 */
    .arrow::after { content: ''; position: absolute; top: 38px; left: 38px; width: 45px; height: 3px; background: #8B4513; transform-origin: left center; transform: rotate(-45deg); border: 0.5px solid #000; z-index: 5; }
    .arrow::before { content: ''; position: absolute; top: 4px; left: 70px; width: 14px; height: 16px; background: #fff; clip-path: polygon(100% 100%, 0% 100%, 25% 50%, 0% 0%, 100% 0%, 75% 50%); transform: translate(-50%, -50%) rotate(-45deg); border: 1px solid #000; z-index: 6; }

    .date-num { font-size: 15px; font-weight: 900; color: #777; margin-top: 5px; }
    
    /* 残数：マステで貼ったようなデザイン */
    .slots-badge { background: var(--pop-yellow, #FFD93D); border: 1.5px solid var(--ink); padding: 1px 6px; font-size: 9px; font-weight: 900; border-radius: 2px; margin-top: -8px; z-index: 10; transform: rotate(2deg); box-shadow: 1px 1px 0px var(--ink); }
    .full .mato { filter: grayscale(1); opacity: 0.2; cursor: not-allowed; }
    .full .slots-badge { background: #ccc; text-decoration: line-through; }

    /* フォーム・ボタン */
    input, select { width: 100%; border: 2px solid #ddd; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 0.9rem; background: #fff; outline: none; }
    input:focus { border-color: var(--main-green); }
    .btn { background: var(--main-green); color: white; width: 100%; padding: 15px; border-radius: 12px; font-weight: 900; border: 2px solid var(--ink); box-shadow: 4px 4px 0px var(--ink); cursor: pointer; transition: 0.1s; }
    .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--ink); }
    .btn-sub { background: white; color: var(--main-green); margin-top: 10px; border: 2px solid var(--main-green); box-shadow: none; font-size: 0.8rem; padding: 10px; }

    .view { display: none; }
    .view.active { display: block; }
  </style>
</head>
<body>

<div class="container">
  <div class="paper-sheet">
    <div id="view-main" class="view active">
      <div class="header-tape"><h1>〜 鹿田弓道部新歓スケジュール 〜</h1></div>
      
      <div id="notices" class="notice-box">Loading... 🏹</div>
      
      <div id="calendar"></div>
      
      <div class="mt-10 pt-6 border-t-2 border-dashed border-gray-300">
        <button onclick="switchView('view-status')" class="btn">通し番号を確認する 🎯</button>
      </div>
    </div>

    <div id="view-form" class="view">
      <h2 id="fTitle" class="font-black text-center text-lg mb-6 text-main-green"></h2>
      <form id="reservationForm">
        <input type="hidden" id="fDate"><input type="hidden" id="fEvent">
        <input type="text" id="name" placeholder="氏名 (漢字)" required>
        <input type="text" id="kana" placeholder="ふりがな" required>
        <select id="major" required>
          <option value="" disabled selected>学科を選択</option>
          <option>医</option><option>歯</option><option>看護</option><option>検査</option><option>放射</option>
        </select>
        <input type="text" id="studentId" placeholder="学籍番号 (T26XXXX)" required>
        <input type="text" id="contact" placeholder="インスタID等" required>
        <button type="submit" id="subBtn" class="btn">予約を確定する 🎯</button>
        <button type="button" onclick="switchView('view-main')" class="btn btn-sub">戻る</button>
      </form>
    </div>

    <div id="view-status" class="view">
      <h2 class="font-black text-center text-lg mb-6">番号の確認</h2>
      <select id="checkMajor">
        <option value="" disabled selected>学科を選択</option>
        <option>医</option><option>歯</option><option>看護</option><option>検査</option><option>放射</option>
      </select>
      <input type="text" id="checkText" placeholder="氏名 or 学籍番号">
      <button onclick="loadStatus()" id="checkBtn" class="btn">検索する 🎯</button>
      <div id="statusList" class="mt-6 space-y-2 text-sm"></div>
      <button onclick="switchView('view-main')" class="btn btn-sub">戻る</button>
    </div>

    <div id="view-success" class="view text-center">
      <div class="py-10">
        <div class="text-6xl mb-6">🏹</div>
        <h2 class="font-black text-2xl mb-4">予約を受け付けました</h2>
        <p class="text-xs text-gray-500 leading-relaxed mb-10">
          部員が確認し「通し番号」を振ります。<br>
          しばらく経ってから「番号を確認する」を見てね！
        </p>
        <button onclick="location.reload()" class="btn">TOPへ戻る</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ★重要：ここに自分のGASのウェブアプリURLを貼り付けてください
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzWjj9RUquGFT8joJ9XoF7CBuf5xHcaOoyRes-Pm096XySMdCz0qbzu84uWvBsmzk9rUA/exec";

  function switchView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  async function apiRequest(payload) {
    const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
    return await res.json();
  }

  window.onload = async () => {
    try {
      const res = await fetch(GAS_URL + "?action=getInitialData").then(r => r.json());
      const c = document.getElementById('calendar');
      c.innerHTML = '';
      res.calendar.forEach(i => {
        const item = document.createElement('div');
        const full = i.max > 0 && i.remaining <= 0;
        item.className = `day-item ${full ? 'full' : ''}`;
        item.innerHTML = `
          <div class="mato ${i.hasArrow ? 'kasumimato arrow' : 'hoshimato'}"></div>
          <span class="date-num">${i.day}</span>
        `;
        if(i.name) {
          const b = document.createElement('div');
          b.className = `slots-badge`;
          b.innerText = full ? '満射' : (i.max > 0 ? `残${i.remaining}` : 'OPEN');
          if(!full) item.onclick = () => {
            document.getElementById('fTitle').innerText = `4/${i.day} ${i.name}🎯`;
            document.getElementById('fDate').value = i.date;
            document.getElementById('fEvent').value = i.name;
            switchView('view-form');
          };
          item.appendChild(b);
        }
        c.appendChild(item);
      });
      document.getElementById('notices').innerText = res.notices.length ? res.notices.map(n => n.content).join(' / ') : "現在おしらせはありません🏹";
    } catch(e) { document.getElementById('notices').innerText = "接続エラー🎯 デプロイ設定を確認してね"; }
  };

  document.getElementById('reservationForm').onsubmit = async (e) => {
    e.preventDefault();
    document.getElementById('subBtn').innerText = "送信中...";
    await apiRequest({ action: "processForm", payload: {
      date: document.getElementById('fDate').value, eventName: document.getElementById('fEvent').value,
      name: document.getElementById('name').value, kana: document.getElementById('kana').value,
      major: document.getElementById('major').value, studentId: document.getElementById('studentId').value,
      contact: document.getElementById('contact').value
    }});
    switchView('view-success');
  };

  async function loadStatus() {
    const btn = document.getElementById('checkBtn');
    btn.innerText = "検索中...";
    const results = await apiRequest({ action: "checkStatus", payload: { searchText: document.getElementById('checkText').value, major: document.getElementById('checkMajor').value } });
    const list = document.getElementById('statusList');
    list.innerHTML = results.length ? results.map(r => `<div class='flex justify-between border-b pb-2'><span class='font-bold'>${r.date} 🎯</span><span class='font-black text-main-green'>No.${r.serial}</span></div>`).join('') : "予約が見つかりません";
    btn.innerText = "検索する 🎯";
  }
</script>

</body>
</html>
